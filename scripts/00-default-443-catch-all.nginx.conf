# 00-default-443.catch-all.conf
# Catch-all para puerto 443 — evita que dominios sin SSL sirvan el Approval Gate
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # Usa el cert de webui.visionnorth.mx como fallback
    ssl_certificate /etc/letsencrypt/live/webui.visionnorth.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webui.visionnorth.mx/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 444 = cerrar conexión sin respuesta (seguro, no da información)
    return 444;
}
