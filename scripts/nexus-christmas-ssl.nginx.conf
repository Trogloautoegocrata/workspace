# nexus.christmas — SSL version (para DNS directo sin Cloudflare)
# Combina listen 80 + 443, sirve Pherkad design y proxy a APIs
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nexus.christmas www.nexus.christmas;

    # Certificado temporal (usa el de webui como fallback)
    # Para cert propio: sudo certbot --nginx -d nexus.christmas -d www.nexus.christmas
    ssl_certificate /etc/letsencrypt/live/webui.visionnorth.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webui.visionnorth.mx/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /home/polaris/workspace/public/nexus-christmas;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:8006/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
