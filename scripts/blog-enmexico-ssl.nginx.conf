# blog.enmexico.casa — SSL + Proxy a Caddy (puerto 8081)
# HTTPS version: Cloudflare conecta a puerto 443, esto proxyea a Caddy
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name blog.enmexico.casa;

    # Usa el cert de enmexico.casa (mismo dominio base)
    ssl_certificate /etc/letsencrypt/live/enmexico.casa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enmexico.casa/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
    }
}
