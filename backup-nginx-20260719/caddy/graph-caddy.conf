# ── CODEBASE MEMORY GRAPH ──
# Importar en /etc/caddy/Caddyfile con: import graph-caddy.conf
http://graph.visionnorth.mx:8081 {
    reverse_proxy localhost:9749 {
        header_up Host localhost
    }
    encode gzip zstd
    header {
        -Server
        X-Content-Type-Options "nosniff"
    }
}
