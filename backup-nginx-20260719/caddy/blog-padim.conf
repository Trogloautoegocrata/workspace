# Blog PADIM — Protocolo Abierto de Datos Inmobiliarios de México
http://blog.enmexico.casa:8081 {
	root * /home/polaris/workspace/public/blog-padim
	encode gzip zstd
	try_files {path} {path}.html {path}/index.html /index.html
	file_server

	header {
		-Server
		X-Content-Type-Options "nosniff"
		X-Frame-Options "DENY"
	}
}