# Sitio del Agente de Soporte IA
# Para importar desde Caddyfile principal

http://agente.visionnorth.mx:8081 {
    reverse_proxy /ws/* localhost:8088
    reverse_proxy /v1/* localhost:8088
    reverse_proxy /health localhost:8088
    reverse_proxy /widget.js localhost:8088

    root * /home/polaris/workspace/agente-soporte/widget
    file_server

    encode gzip zstd

    header {
        -Server
        Access-Control-Allow-Origin "*"
        Access-Control-Allow-Methods "GET, POST, OPTIONS"
        Access-Control-Allow-Headers "Content-Type"
    }
}
