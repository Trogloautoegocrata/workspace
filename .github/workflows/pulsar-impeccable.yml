# Pulsar — Design Quality Gate (Impeccable)
"on":
  pull_request:
    paths:
      - "pulsar/**"
      - ".github/workflows/pulsar-impeccable.yml"
  push:
    branches: [main, master]
    paths:
      - "pulsar/**"
      - ".github/workflows/pulsar-impeccable.yml"

jobs:
  detect:
    name: 🎨 Impeccable Design Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 🔍 Ejecutar Impeccable detect
        run: npx impeccable detect pulsar/app/templates/
        working-directory: ./
        continue-on-error: false
